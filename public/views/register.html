<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - TicoAutos</title>
    <link rel="stylesheet" href="/css/main.css">
    <link rel="stylesheet" href="/css/auth.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>

<body>
    <div class="auth-wrapper">
        <div class="auth-visual">
            <div class="visual-content">
                <h2>Únete hoy.</h2>
                <p>Crea tu perfil y empieza a gestionar tus anuncios con la mejor tecnología.</p>
            </div>
        </div>

        <div class="auth-form-side" style="position: relative;">
            <a href="/home" class="back-home-btn"><i class="fas fa-arrow-left"></i> Volver al inicio</a>
            <div class="form-container">
                <h1>Crea tu cuenta</h1>
                <p class="subtitle">Completa el formulario para registrarte</p>

                <form id="register-form">

                    <div class="form-group">
                        <label for="numberId">Cédula</label>
                        <input type="text" id="numberId" name="numberId" placeholder="Ej: 208790566" required>
                    </div>

                    <div class="form-group">
                        <label for="name">Nombre</label>
                        <input type="text" id="name" name="name" placeholder="Jeremy" required>
                    </div>

                    <div class="form-group">
                        <label for="lastName1">Primer Apellido</label>
                        <input type="text" id="lastName1" name="lastName1" placeholder="Rodriguez" required>
                    </div>

                    <div class="form-group">
                        <label for="lastName2">Segundo Apellido</label>
                        <input type="text" id="lastName2" name="lastName2" placeholder="Esquivel">
                    </div>

                    <div class="form-group">
                        <label for="email">Correo Electrónico</label>
                        <input type="email" id="email" name="email" placeholder="ejemplo@correo.com" required>
                    </div>

                    <div class="form-group">
                        <label for="phone">Número Telefónico</label>
                        <input type="tel" id="phone" name="phone" placeholder="Ej: 8888-8888" required>
                    </div>

                    <div class="form-group">
                        <label for="password">Contraseña</label>
                        <input type="password" id="password" name="password" placeholder="••••••••" required>
                    </div>

                    <div class="form-group">
                        <label for="confirm-password">Confirmar Contraseña</label>
                        <input type="password" id="confirm-password" name="confirm-password" placeholder="••••••••"
                            required>
                    </div>

                    <button type="submit" class="btn">Registrarme Ahora</button>
                </form>

                <div class="footer-link">
                    ¿Ya tienes cuenta? <a href="/login">Inicia sesión</a>
                </div>
            </div>
        </div>
    </div>

    <script src="/js/register.js"></script>
</body>

</html>
